      <stop offset="0%" stop-color="#10241f"/>
      <stop offset="100%" stop-color="#08110f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EA8A0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5EA8A0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5EA8A0" stop-opacity="0"/>
