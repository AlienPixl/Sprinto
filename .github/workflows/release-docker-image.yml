name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

jobs:
  build-docker-image:
    if: github.repository == 'AlienPixl/Sprinto'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        env:
          CHECKOUT_REF: ${{ github.sha }}
          REPO_TOKEN: ${{ github.token }}
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

          if [ -d .git ]; then
            rm -rf .git
          fi

          git init .
          git remote add origin "https://x-access-token:${REPO_TOKEN}@github.com/${REPOSITORY_NAME}.git"
          git fetch --force --no-tags --depth=1 origin "${CHECKOUT_REF}"
          git checkout --force --detach FETCH_HEAD

      - name: Resolve release metadata
        run: |
          CHANGELOG_FILE="changelog/${GITHUB_REF_NAME}.md"
          RELEASE_COMPOSE_FILE="./docker-image/docker-compose-${GITHUB_REF_NAME}.yml"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "Missing changelog file: $CHANGELOG_FILE" >&2
            exit 1
          fi
          echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> "$GITHUB_ENV"
          echo "RELEASE_COMPOSE_FILE=$RELEASE_COMPOSE_FILE" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Sprinto ${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Bootstrap Docker Buildx
        run: |
          docker buildx version
          docker buildx inspect sprinto-release-builder >/dev/null 2>&1 || docker buildx create --name sprinto-release-builder --use
          docker buildx use sprinto-release-builder
          docker buildx inspect --bootstrap

      - name: Build linux/amd64 Docker image tar
        run: |
          mkdir -p docker-image
          docker buildx build \
            --platform linux/amd64 \
            --tag sprinto:${GITHUB_REF_NAME} \
            --output type=docker,dest=./docker-image/sprinto-${GITHUB_REF_NAME}-linux-amd64.tar \
            .

      - name: Compress Docker image tar
        run: gzip -f ./docker-image/sprinto-${GITHUB_REF_NAME}-linux-amd64.tar

      - name: Prepare release docker compose file
        run: |
          awk -v image="sprinto:${GITHUB_REF_NAME}" '
            /^    build:/ { skip = 1; next }
            skip && /^    [^ ]/ { skip = 0 }
            skip { next }
            /^    image: \$\{SPRINTO_APP_IMAGE:-sprinto-local:dev\}$/ {
              print "    image: " image
              next
            }
            { print }
          ' docker-compose.yml > "${RELEASE_COMPOSE_FILE}"

      - name: Verify GitHub CLI
        run: gh --version

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          IMAGE_TAR="./docker-image/sprinto-${GITHUB_REF_NAME}-linux-amd64.tar.gz"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${RELEASE_NAME}" --notes-file "${CHANGELOG_FILE}"
            gh release upload "${GITHUB_REF_NAME}" "${IMAGE_TAR}" "${RELEASE_COMPOSE_FILE}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${IMAGE_TAR}" "${RELEASE_COMPOSE_FILE}" --title "${RELEASE_NAME}" --notes-file "${CHANGELOG_FILE}"
          fi
