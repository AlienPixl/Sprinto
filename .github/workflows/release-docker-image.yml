name: Release
run-name: Release ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish in AlienPixl/Sprinto
        required: true
        type: string

jobs:
  build-docker-image:
    if: github.repository == 'AlienPixl/Sprinto'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Checkout
        env:
          CHECKOUT_REF: refs/tags/${{ inputs.release_tag }}
          REPO_TOKEN: ${{ github.token }}
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

          if [ -d .git ]; then
            rm -rf .git
          fi

          git init .
          git remote add origin "https://x-access-token:${REPO_TOKEN}@github.com/${REPOSITORY_NAME}.git"
          git fetch --force --tags origin
          git checkout --force --detach "${CHECKOUT_REF}"

      - name: Resolve release metadata
        run: |
          CHANGELOG_FILE="changelog/${RELEASE_TAG}.md"
          RELEASE_COMPOSE_TEMPLATE="docker-compose.example.yml"
          RELEASE_COMPOSE_FILE="./docker-image/docker-compose.example-${RELEASE_TAG}.yml"
          RELEASE_ENV_EXAMPLE_FILE="./docker-image/default.env.example"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "Missing changelog file: $CHANGELOG_FILE" >&2
            exit 1
          fi
          if [ ! -f "$RELEASE_COMPOSE_TEMPLATE" ]; then
            echo "Missing compose template: $RELEASE_COMPOSE_TEMPLATE" >&2
            exit 1
          fi
          if [ ! -f "default.env.example" ]; then
            echo "Missing env template: default.env.example" >&2
            exit 1
          fi
          echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> "$GITHUB_ENV"
          echo "RELEASE_COMPOSE_TEMPLATE=$RELEASE_COMPOSE_TEMPLATE" >> "$GITHUB_ENV"
          echo "RELEASE_COMPOSE_FILE=$RELEASE_COMPOSE_FILE" >> "$GITHUB_ENV"
          echo "RELEASE_ENV_EXAMPLE_FILE=$RELEASE_ENV_EXAMPLE_FILE" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Sprinto ${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Bootstrap Docker Buildx
        run: |
          docker buildx version
          docker buildx inspect sprinto-release-builder >/dev/null 2>&1 || docker buildx create --name sprinto-release-builder --use
          docker buildx use sprinto-release-builder
          docker buildx inspect --bootstrap

      - name: Build linux/amd64 Docker image tar
        run: |
          mkdir -p docker-image
          docker buildx build \
            --platform linux/amd64 \
            --tag sprinto:${RELEASE_TAG} \
            --output type=docker,dest=./docker-image/sprinto-${RELEASE_TAG}-linux-amd64.tar \
            .

      - name: Compress Docker image tar
        run: gzip -f ./docker-image/sprinto-${RELEASE_TAG}-linux-amd64.tar

      - name: Prepare release docker compose file
        run: |
          awk -v image="sprinto:${RELEASE_TAG}" '
            /^    build:/ { skip = 1; next }
            skip && /^    [^ ]/ { skip = 0 }
            skip { next }
            /^    image: \$\{SPRINTO_APP_IMAGE:-sprinto-local:dev\}$/ {
              print "    image: " image
              next
            }
            { print }
          ' "${RELEASE_COMPOSE_TEMPLATE}" > "${RELEASE_COMPOSE_FILE}"

      - name: Stage release env example
        run: |
          cp default.env.example "${RELEASE_ENV_EXAMPLE_FILE}"

      - name: Verify GitHub CLI
        run: gh --version

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          IMAGE_TAR="./docker-image/sprinto-${RELEASE_TAG}-linux-amd64.tar.gz"
          ENV_EXAMPLE="${RELEASE_ENV_EXAMPLE_FILE}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_NAME}" --notes-file "${CHANGELOG_FILE}"
            gh release upload "${RELEASE_TAG}" "${IMAGE_TAR}" "${RELEASE_COMPOSE_FILE}" "${ENV_EXAMPLE}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${IMAGE_TAR}" "${RELEASE_COMPOSE_FILE}" "${ENV_EXAMPLE}" --title "${RELEASE_NAME}" --notes-file "${CHANGELOG_FILE}"
          fi
